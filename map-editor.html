<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Castle Defend Map Editor</title>
    <link rel="stylesheet" href="css/map_editor.css">
</head>
<body>
    <main class="editor-shell">
        <header class="editor-topbar">
            <div>
                <div class="editor-kicker">V170 地图资产编辑器</div>
                <h1>Map Editor</h1>
            </div>
            <div class="file-actions">
                <button id="openFileBtn" type="button">打开本地 maps.js</button>
                <button id="saveFileBtn" type="button">保存</button>
                <button id="downloadBtn" type="button">下载</button>
                <button id="downloadLevelBtn" class="level-file-btn export-level" type="button" title="下载当前关卡为 JS 文件">
                    <span class="arrow-icon" aria-hidden="true">⬆</span>
                    <span>单关卡</span>
                </button>
                <button id="importLevelBtn" class="level-file-btn import-level" type="button" title="导入单关卡 JS 并覆盖当前关卡">
                    <span class="arrow-icon" aria-hidden="true">⬇</span>
                    <span>导入关卡</span>
                </button>
                <button id="addLevelBtn" type="button">新增关卡</button>
                <a href="animation-assets.html" class="home-link tool-link">动画资产</a>
                <a href="index.html" class="home-link">回到游戏</a>
                <input id="fallbackFileInput" type="file" accept=".js,text/javascript,application/javascript" hidden>
                <input id="levelImportFileInput" type="file" accept=".js,text/javascript,application/javascript" hidden>
            </div>
        </header>

        <section class="status-line" id="statusLine">准备读取地图文件</section>

        <section class="editor-grid">
            <aside class="side-panel">
                <label class="field-label" for="levelSelect">关卡</label>
                <select id="levelSelect"></select>

                <div class="level-fields">
                    <label>
                        标题
                        <input id="titleInput" type="text">
                    </label>
                    <label>
                        关卡类型
                        <select id="levelTypeInput">
                            <option value="defense">防御</option>
                            <option value="attack">进攻</option>
                        </select>
                    </label>
                    <label>
                        敌人数量
                        <input id="enemiesInput" type="number" step="1" readonly>
                    </label>
                    <label>
                        镜头范围
                        <input id="cameraExtentInput" type="number" step="0.1">
                    </label>
                    <label>
                        路宽
                        <input id="roadWidthInput" type="number" step="0.1">
                    </label>
                    <label>
                        出生点 X/Z
                        <input id="spawnInput" type="text" readonly>
                    </label>
                    <label>
                        基地 X/Z
                        <input id="baseInput" type="text" readonly>
                    </label>
                </div>

                <div class="hint-box">
                    <strong>保存说明</strong>
                    <p>页面会自动读取当前 `js/maps.js` 供预览和下载。要直接写回文件，请先点“打开本地 maps.js”并选择项目里的 `js/maps.js`，之后“保存”会原地覆盖。</p>
                </div>
            </aside>

            <section class="canvas-panel">
                <canvas id="mapCanvas" width="720" height="720"></canvas>
                <div class="legend">
                    <span><b class="red"></b>道路</span>
                    <span><b class="green"></b>出生点</span>
                    <span><b class="blue"></b>炮台底座</span>
                    <span><b class="yellow"></b>基地</span>
                </div>
            </section>

            <section class="edit-panel">
                <div class="editor-card" id="slotsCard">
                    <div class="card-head">
                        <h2>道路节点</h2>
                        <button id="addPointBtn" type="button">加节点</button>
                    </div>
                    <div id="pointsList" class="row-list"></div>
                </div>

                <div class="editor-card alt-path-card">
                    <div class="card-head">
                        <h2>Alternate 敌人路径</h2>
                        <div class="mini-actions">
                            <button id="copyAltPathBtn" type="button">复制主路</button>
                            <button id="addAltPointBtn" type="button">加节点</button>
                            <button id="clearAltPathBtn" type="button">清空</button>
                        </div>
                    </div>
                    <div id="altPointsList" class="row-list"></div>
                </div>

                <div class="editor-card">
                    <div class="card-head">
                        <h2>炮台底座</h2>
                        <button id="addSlotBtn" type="button">加底座</button>
                    </div>
                    <div id="slotsList" class="row-list"></div>
                </div>

                <div class="editor-card rules-card" id="rulesCard">
                    <div class="card-head">
                        <h2>本关规则</h2>
                    </div>
                    <label class="rule-money-field">
                        启动资金
                        <input id="startingScoreInput" type="number" step="1">
                    </label>
                    <div class="weapon-options" id="weaponOptions"></div>
                </div>

                <div class="editor-card card-rules-card" id="cardRulesCard">
                    <div class="card-head">
                        <h2>卡片规则</h2>
                        <label class="card-enable-toggle">
                            <input id="cardsEnabledInput" type="checkbox">
                            出现卡片
                        </label>
                    </div>
                    <div id="cardRulesList" class="card-rules-list"></div>
                </div>

                <div class="editor-card attack-only-card" id="attackRulesCard">
                    <div class="card-head">
                        <h2>进攻规则</h2>
                    </div>
                    <div class="attack-rule-grid">
                        <label>
                            敌方基地 HP
                            <input id="opponentBaseHpInput" type="number" step="1">
                        </label>
                        <label>
                            倒计时(秒)
                            <input id="timeLimitInput" type="number" step="1">
                        </label>
                        <label>
                            收入数量
                            <input id="incomeAmountInput" type="number" step="1">
                        </label>
                        <label>
                            收入间隔(秒)
                            <input id="incomeIntervalInput" type="number" step="0.1">
                        </label>
                    </div>
                    <div class="attack-unit-tools">
                        <select id="attackUnitPicker"></select>
                        <button id="addAttackUnitBtn" type="button">加兵种</button>
                    </div>
                    <div class="attack-unit-options" id="attackUnitOptions"></div>
                    <div id="attackUnitsList" class="attack-units-list"></div>
                </div>

                <div class="editor-card attack-only-card" id="enemyTowersCard">
                    <div class="card-head">
                        <h2>敌方炮塔底座</h2>
                        <button id="addEnemyTowerBtn" type="button">加炮塔</button>
                    </div>
                    <div id="enemyTowersList" class="row-list"></div>
                </div>

                <div class="editor-card advanced-card" hidden>
                    <div class="card-head">
                        <h2>高级数据</h2>
                        <button id="applyAdvancedBtn" type="button">应用</button>
                    </div>
                    <textarea id="advancedJson" spellcheck="false"></textarea>
                </div>
            </section>

            <section class="editor-card wave-card wide-wave-card" id="waveCard">
                <div class="card-head">
                    <h2>敌人批次</h2>
                    <button id="addWaveBtn" type="button">加批次</button>
                </div>
                <div id="waveTimeline" class="wave-timeline"></div>
                <div id="wavesList" class="wave-list"></div>
            </section>
        </section>
    </main>

    <script src="js/enemy_config.js"></script>
    <script src="js/weapon_config.js"></script>
    <script src="js/map_editor.js"></script>
</body>
</html>
