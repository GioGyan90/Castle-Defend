<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animation Assets - Castle Defend</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            overflow: hidden;
            color: #f4fbff;
            background: #071019;
            font-family: Arial, sans-serif;
            cursor: default;
        }

        #stage {
            position: fixed;
            inset: 0;
            cursor: grab;
            touch-action: none;
        }

        #stage.is-dragging {
            cursor: grabbing;
        }

        .topbar {
            position: fixed;
            top: 18px;
            left: 18px;
            right: 18px;
            z-index: 5;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
            pointer-events: none;
        }

        .brand,
        .asset-name {
            padding: 8px 12px;
            border: 1px solid rgba(76, 236, 255, 0.34);
            border-radius: 8px;
            background: rgba(7, 16, 25, 0.76);
            box-shadow: 0 0 24px rgba(76, 236, 255, 0.18);
            font-weight: 900;
            letter-spacing: 0;
        }

        .brand {
            color: #4cecff;
        }

        .asset-name {
            color: #ffffff;
            text-align: right;
        }

        .control-panel {
            position: fixed;
            left: 18px;
            right: 18px;
            bottom: 18px;
            z-index: 6;
            display: grid;
            grid-template-columns: minmax(160px, 0.9fr) minmax(240px, 1.1fr) minmax(220px, 0.9fr) auto;
            gap: 14px;
            align-items: stretch;
            padding: 14px;
            border: 1px solid rgba(76, 236, 255, 0.42);
            border-radius: 8px;
            background: rgba(8, 18, 29, 0.92);
            box-shadow: 0 18px 40px rgba(0, 0, 0, 0.32);
            transition: transform 0.28s ease, opacity 0.24s ease;
        }

        .control-panel.collapsed {
            transform: translateY(calc(100% - 44px));
            opacity: 0.96;
        }

        .panel-toggle {
            position: absolute;
            top: -42px;
            right: 0;
            min-height: 34px;
            padding: 0 14px;
            border: 1px solid rgba(76, 236, 255, 0.44);
            border-radius: 8px 8px 0 0;
            color: #f4fbff;
            background: rgba(8, 18, 29, 0.94);
            font-size: 12px;
            font-weight: 900;
            cursor: pointer;
        }

        .asset-picker {
            min-width: 0;
            padding: 10px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .asset-picker label {
            display: flex;
            justify-content: space-between;
            gap: 8px;
            margin-bottom: 8px;
            color: #cfe6ee;
            font-size: 13px;
            font-weight: 800;
        }

        .asset-picker select {
            width: 100%;
            min-height: 48px;
            padding: 0 14px;
            border: 1px solid rgba(76, 236, 255, 0.4);
            border-radius: 8px;
            color: #f4fbff;
            background: #142334;
            font-size: 15px;
            font-weight: 900;
            outline: none;
        }

        .asset-picker option,
        .asset-picker optgroup {
            color: #0c1722;
            background: #f4fbff;
        }

        .play-button,
        .save-button {
            min-height: 48px;
            border: 0;
            border-radius: 8px;
            font-weight: 900;
            cursor: pointer;
        }

        .sliders {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 12px;
        }

        .field {
            min-width: 0;
            padding: 10px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .field label {
            display: flex;
            justify-content: space-between;
            gap: 8px;
            margin-bottom: 8px;
            color: #cfe6ee;
            font-size: 13px;
            font-weight: 800;
        }

        input[type="range"] {
            width: 100%;
            accent-color: #4cecff;
        }

        .part-panel {
            min-width: 0;
            padding: 10px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .part-panel[hidden] {
            display: none;
        }

        .part-title {
            display: flex;
            justify-content: space-between;
            gap: 8px;
            margin-bottom: 8px;
            color: #cfe6ee;
            font-size: 13px;
            font-weight: 900;
        }

        .part-controls {
            display: grid;
            gap: 8px;
        }

        .part-control label {
            display: flex;
            justify-content: space-between;
            gap: 8px;
            margin-bottom: 5px;
            color: #f4fbff;
            font-size: 12px;
            font-weight: 800;
        }

        .part-control select {
            width: 100%;
            min-height: 34px;
            padding: 0 10px;
            border: 1px solid rgba(76, 236, 255, 0.34);
            border-radius: 8px;
            color: #f4fbff;
            background: #142334;
            font-weight: 900;
            outline: none;
        }

        .action-stack {
            display: grid;
            gap: 8px;
            min-width: 118px;
        }

        .play-button {
            min-width: 108px;
            padding: 0 22px;
            color: #06111b;
            background: #ffd000;
            box-shadow: 0 0 18px rgba(255, 208, 0, 0.32);
            font-size: 18px;
        }

        .save-button {
            padding: 0 16px;
            color: #06111b;
            background: #4cecff;
            box-shadow: 0 0 18px rgba(76, 236, 255, 0.28);
            font-size: 15px;
        }

        .save-status {
            min-height: 18px;
            color: #aeefff;
            font-size: 12px;
            font-weight: 800;
            text-align: center;
        }

        @media (max-width: 760px) {
            .topbar {
                top: 10px;
                left: 10px;
                right: 10px;
            }

            .brand,
            .asset-name {
                font-size: 12px;
                padding: 7px 9px;
            }

            .control-panel {
                left: 10px;
                right: 10px;
                bottom: 10px;
                grid-template-columns: 1fr;
                gap: 10px;
                padding: 10px;
            }

            .sliders {
                grid-template-columns: 1fr;
            }

            .asset-picker select {
                min-height: 44px;
            }
        }
    </style>
</head>
<body>
    <canvas id="stage"></canvas>
    <div class="topbar">
        <div class="brand">V162 Animation Assets</div>
        <div class="asset-name" id="assetName">Boss Explosion</div>
    </div>

    <section class="control-panel" aria-label="Animation asset controls">
        <button class="panel-toggle" id="panelToggle" type="button" aria-expanded="true">Collapse Controls</button>
        <div class="asset-picker">
            <label for="assetSelect">Asset <span id="assetGroup">Animation Effects</span></label>
            <select id="assetSelect"></select>
        </div>
        <div class="sliders">
            <div class="field">
                <label for="directionSlider">Direction <span id="directionValue">35 deg</span></label>
                <input id="directionSlider" type="range" min="0" max="360" value="35">
            </div>
            <div class="field">
                <label for="amplitudeSlider">Amplitude <span id="amplitudeValue">1.00</span></label>
                <input id="amplitudeSlider" type="range" min="0.25" max="2" step="0.05" value="1">
            </div>
            <div class="field">
                <label for="sizeSlider">Size <span id="sizeValue">6.5</span></label>
                <input id="sizeSlider" type="range" min="2" max="12" step="0.1" value="6.5">
            </div>
        </div>
        <div class="part-panel" id="partPanel" hidden>
            <div class="part-title">Animated Parts <span id="partName">Wheel</span></div>
            <div class="part-controls" id="partControls"></div>
        </div>
        <div class="action-stack">
            <button class="play-button" id="playButton" type="button">Play</button>
            <button class="save-button" id="saveButton" type="button">Save Animation</button>
            <div class="save-status" id="saveStatus"></div>
        </div>
    </section>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="js/weapon_config.js"></script>
    <script src="js/enemy_config.js"></script>
    <script src="js/weapons.js"></script>
    <script src="js/imported_chopper_model.js"></script>
    <script src="js/space_base.js"></script>
    <script src="js/enemies.js"></script>
    <script src="js/rocket_robot_assets.js"></script>
    <script src="js/gallery.js"></script>
    <script src="js/animation_assets.js"></script>
    <script src="js/animation_showcase_assets.js"></script>
    <script src="js/animation_assets_page.js"></script>
</body>
</html>
