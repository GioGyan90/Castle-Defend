<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Emoji Castle Defense - Compact Mobile</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="status-bar" style="display:none;">
    <div class="version-tag">V113</div>
    <div class="lvl-tag">M:<span id="levelVal">1</span></div>
    <div class="stat-item">HP <span id="livesVal">5</span></div>
    <div class="stat-item">PTS <span id="scoreVal">3</span></div>
    <button id="pauseBtn" class="pause-btn" onclick="showPauseMenu()" aria-label="暂停" title="暂停">⏸</button>
</div>

<div id="overlay">
    <div class="dialog main-menu">
        <h2 id="modalTitle">Defend Castle</h2>
        <p id="modalDesc">选择你的部署方式，检查敌军图鉴，或直接进入城堡防线。</p>

        <div class="menu-actions">
            <button class="menu-btn start-btn" onclick="startGame(false)">直接开始游戏</button>
            <button class="menu-btn debug-entry" onclick="showLevelSelect()">Debug 模式</button>
            <button class="menu-btn enemy-entry" onclick="showModelGallery('enemies')">敌方单位展示馆</button>
            <button class="menu-btn tower-entry" onclick="showModelGallery('towers')">防御塔展示馆</button>
            <button class="menu-btn leaderboard-entry" onclick="showLeaderboard()">🏆 排行榜</button>
        </div>

        <div id="levelSelect" class="level-select" style="display:none;">
            <label for="levelDropdown">Select Level:</label>
            <select id="levelDropdown">
                <option value="1">Mission 1</option>
                <option value="2">Mission 2</option>
                <option value="3">Mission 3 - Final Boss</option>
            </select>
            <button class="weapon-btn confirm-debug" onclick="startDebugWithLevel()">ENTER DEBUG</button>
            <button class="weapon-btn cancel-debug" onclick="hideLevelSelect()">CANCEL</button>
        </div>
    </div>
</div>

<div id="modelGallery" class="gallery-overlay" style="display:none;">
    <div class="gallery-panel">
        <div class="gallery-header">
            <div>
                <h2 id="galleryTitle">展示馆</h2>
                <p id="galleryDesc">模型预览</p>
            </div>
            <button class="gallery-close" onclick="closeModelGallery()">返回</button>
        </div>
        <div id="galleryGrid" class="model-grid"></div>
    </div>
</div>

<div id="leaderboardPanel" class="gallery-overlay" style="display:none;">
    <div class="gallery-panel leaderboard-panel">
        <div class="gallery-header">
            <div>
                <h2>🏆 玩家得分排行榜</h2>
                <p id="leaderboardDesc">历史最高分记录 (前 10 名)</p>
            </div>
            <button class="gallery-close" onclick="closeLeaderboard()">返回</button>
        </div>
        <div id="leaderboardContent" class="leaderboard-content">
            <table class="leaderboard-table">
                <thead>
                    <tr>
                        <th>排名</th>
                        <th>关卡</th>
                        <th>玩家</th>
                        <th>得分</th>
                        <th>剩余 HP</th>
                        <th>时间</th>
                    </tr>
                </thead>
                <tbody id="leaderboardBody">
                </tbody>
            </table>
        </div>
        <div class="leaderboard-footer">
            <button class="weapon-btn" onclick="clearLeaderboard()">清空排行榜</button>
        </div>
    </div>
</div>

<div id="flashOverlay"></div>

<div id="pauseOverlay" class="pause-overlay" style="display:none;">
    <div class="pause-panel">
        <h2>游戏暂停</h2>
        <div class="pause-actions">
            <button class="pause-action resume-action" onclick="resumeGame()">继续游戏</button>
            <button class="pause-action home-action" onclick="returnToHome()">退回首页</button>
            <button class="pause-action restart-action" onclick="restartCurrentLevel()">重开本关</button>
            <button id="soundToggleBtn" class="pause-action sound-action" onclick="toggleSound()">关闭声音</button>
        </div>
    </div>
</div>

<div id="bottom-nav" style="display:none;">
    <div class="shop-row">
        <button id="btn1" class="weapon-btn" onclick="buyWeapon(1)">PULSE <span id="price1" class="price-tag">3 Pts</span></button>
        <button id="btn2" class="weapon-btn" onclick="buyWeapon(2)">RAIL <span id="price2" class="price-tag">12 Pts</span></button>
        <button id="btn3" class="weapon-btn" onclick="buyWeapon(3)">TESLA <span id="price3" class="price-tag">25 Pts</span></button>
    </div>
    <button id="btnSell" onclick="toggleSellMode()">RECYCLE (50% Refund)</button>
</div>

<div id="endScreen">
    <div id="msg"></div>
    <div id="damageSummary"></div>
    <button class="weapon-btn" id="endBtn" style="background:#f1c40f; color:#000; padding:15px; margin-top:20px;" onclick="handleEndClick()">NEXT</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/cannon.js/0.6.2/cannon.min.js"></script>
<script src="js/weapon_config.js"></script>
<script src="js/enemy_config.js"></script>
<script src="js/config.js"></script>
<script src="js/weapons.js"></script>
<script src="js/enemies.js"></script>
<script src="js/imported_chopper_model.js"></script>
<script src="js/castle.js"></script>
<script src="js/space_base.js"></script>
<script src="js/game.js"></script>
<script src="js/gallery.js"></script>
</body>
</html>
